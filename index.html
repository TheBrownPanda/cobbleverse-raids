  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;


// ─── TYPE CHART ───
const TYPES = ["Normal","Fire","Water","Electric","Grass","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"];
const _tc={Normal:{Rock:.5,Ghost:0,Steel:.5},Fire:{Fire:.5,Water:.5,Grass:2,Ice:2,Bug:2,Rock:.5,Dragon:.5,Steel:2},Water:{Fire:2,Water:.5,Grass:.5,Ground:2,Rock:2,Dragon:.5},Electric:{Water:2,Electric:.5,Grass:.5,Ground:0,Flying:2,Dragon:.5},Grass:{Fire:.5,Water:2,Grass:.5,Poison:.5,Ground:2,Flying:.5,Bug:.5,Rock:2,Dragon:.5,Steel:.5},Ice:{Fire:.5,Water:.5,Grass:2,Ice:.5,Ground:2,Flying:2,Dragon:2,Steel:.5},Fighting:{Normal:2,Ice:2,Poison:.5,Flying:.5,Psychic:.5,Bug:.5,Rock:2,Ghost:0,Dark:2,Steel:2,Fairy:.5},Poison:{Grass:2,Poison:.5,Ground:.5,Rock:.5,Ghost:.5,Steel:0,Fairy:2},Ground:{Fire:2,Electric:2,Grass:.5,Poison:2,Flying:0,Bug:.5,Rock:2,Steel:2},Flying:{Electric:.5,Grass:2,Fighting:2,Bug:2,Rock:.5,Steel:.5},Psychic:{Fighting:2,Poison:2,Psychic:.5,Dark:0,Steel:.5},Bug:{Fire:.5,Grass:2,Fighting:.5,Poison:.5,Flying:.5,Psychic:2,Ghost:.5,Dark:2,Steel:.5,Fairy:.5},Rock:{Fire:2,Ice:2,Fighting:.5,Ground:.5,Flying:2,Bug:2,Steel:.5},Ghost:{Normal:0,Psychic:2,Ghost:2,Dark:.5},Dragon:{Dragon:2,Steel:.5,Fairy:0},Dark:{Fighting:.5,Psychic:2,Ghost:2,Dark:.5,Fairy:.5},Steel:{Fire:.5,Water:.5,Electric:.5,Ice:2,Rock:2,Steel:.5,Fairy:2},Fairy:{Fire:.5,Poison:.5,Fighting:2,Dragon:2,Dark:2,Steel:.5}};
function getEff(atkType, defTypes) { let m = 1; for (const d of defTypes) m *= (_tc[atkType]?.[d] ?? 1); return m; }

const TC = {Normal:"#A8A77A",Fire:"#EE8130",Water:"#6390F0",Electric:"#F7D02C",Grass:"#7AC74C",Ice:"#96D9D6",Fighting:"#C22E28",Poison:"#A33EA1",Ground:"#E2BF65",Flying:"#A98FF3",Psychic:"#F95587",Bug:"#A6B91A",Rock:"#B6A136",Ghost:"#735797",Dragon:"#6F35FC",Dark:"#705746",Steel:"#B7B7CE",Fairy:"#D685AD"};

// ─── DATA LOADING ───
function useDataLoader(basePath) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        const [pokemonRes, movesRes, learnsetsRes, abilitiesRes, bossRes, tagsRes] = await Promise.all([
          fetch(`${basePath}/pokemon.json`),
          fetch(`${basePath}/moves.json`),
          fetch(`${basePath}/learnsets.json`),
          fetch(`${basePath}/abilities.json`),
          fetch(`${basePath}/boss-movesets.json`),
          fetch(`${basePath}/move-tags.json`),
        ]);
        const [pokemon, moves, learnsets, abilities, boss, tags] = await Promise.all([
          pokemonRes.json(), movesRes.json(), learnsetsRes.json(),
          abilitiesRes.json(), bossRes.json(), tagsRes.json(),
        ]);
        setData({ pokemon, moves, learnsets, abilities, boss, tags });
      } catch (e) {
        setError(e.message);
      }
      setLoading(false);
    }
    load();
  }, [basePath]);

  return { data, loading, error };
}

// ─── BOSS MOVESET LOOKUP ───
function getBossMoveset(bossData, pokemonName, starLevel) {
  if (!bossData) return null;
  const id = pokemonName.toLowerCase().replace(/[^a-z0-9]/g, '');
  const table = starLevel >= 7 ? bossData.bosses100 : starLevel >= 6 ? bossData.bosses90 : bossData.bosses75;
  const indices = table?.[id];
  if (!indices || indices.length === 0) return null;
  return indices.map(i => {
    const m = bossData.moves[i];
    return { name: m[0], cat: m[1], type: m[2], bp: m[3] };
  });
}

function detectBossStyle(moveset) {
  if (!moveset) return "mixed";
  let phys = 0, spec = 0;
  for (const m of moveset) {
    if (m.cat === "P" && m.bp > 0) phys += m.bp;
    else if (m.cat === "S" && m.bp > 0) spec += m.bp;
  }
  if (phys > 0 && spec === 0) return "physical";
  if (spec > 0 && phys === 0) return "special";
  if (phys > spec * 1.5) return "physical";
  if (spec > phys * 1.5) return "special";
  return "mixed";
}

// ─── BUILD COUNTER FROM RAW DATA ───
function buildCounter(pid, pokemon, movesDB, learnset, abilitiesDB, tagsDB) {
  const p = pokemon[pid];
  if (!p || !learnset) return null;
  // Skip if BST too low (NFE pokemon generally bad in raids)
  const bst = p.hp + p.atk + p.def + p.spa + p.spd + p.spe;
  if (bst < 350) return null;

  // Classify abilities
  const abilityEffects = [];
  let bestAbility = p.abilities[0];
  let bestAbilityScore = -1;
  for (const ab of p.abilities) {
    const info = abilitiesDB[ab];
    if (info && !info.raidDead && !info.raidReduced) {
      // Rough scoring to pick best ability for raids
      let score = 0;
      if (info.typeImmune) score += 5;
      if (info.atkMult) score += (info.atkMult - 1) * 10;
      if (info.spaMult) score += (info.spaMult - 1) * 10;
      if (info.offBoost) score += info.offBoost * 2;
      if (info.passiveHeal) score += info.passiveHeal / 3;
      if (info.snowball) score += 2;
      if (info.contrary) score += 8;
      if (info.toxicChain) score += 4;
      if (info.sereneGrace) score += 3;
      if (info.adaptability) score += 4;
      if (info.techBoost) score += 3;
      if (info.noChipDmg) score += 3;
      if (info.dmgReduction) score += 4;
      if (info.defMult) score += 3;
      if (info.contactDmg) score += 2;
      if (info.contactBurn) score += 2;
      if (score > bestAbilityScore) { bestAbilityScore = score; bestAbility = ab; }
    }
  }
  const abilityInfo = abilitiesDB[bestAbility] || {};

  // Classify available moves
  const availableMoves = [];
  for (const mid of learnset) {
    const move = movesDB[mid];
    if (!move) continue;
    // Determine raid role
    let role = "attack";
    if (tagsDB.setup_physical?.includes(mid)) role = "setup_phys";
    else if (tagsDB.setup_special?.includes(mid)) role = "setup_spec";
    else if (tagsDB.setup_both?.includes(mid)) role = "setup_both";
    else if (tagsDB.setup_defense?.includes(mid)) role = "setup_def";
    else if (tagsDB.recovery_reliable?.includes(mid)) role = "recovery";
    else if (tagsDB.recovery_rest?.includes(mid)) role = "rest";
    else if (tagsDB.recovery_drain?.includes(mid)) role = "drain";
    else if (tagsDB.sustain_passive?.includes(mid)) role = "passive_sustain";
    else if (move.cat === "S" && move.bp === 0) role = "status";
    else if (move.cat === "P" && move.bp === 0) role = "status";

    availableMoves.push({ id: mid, name: move.name, type: move.type, bp: move.bp, cat: move.cat, role });
  }

  // Determine setup type
  const hasQD = availableMoves.some(m => m.id === "quiverdance");
  const hasCM = availableMoves.some(m => m.role === "setup_spec" || m.id === "calmmind");
  const hasBU = availableMoves.some(m => m.role === "setup_phys" && m.id === "bulkup");
  const hasSD = availableMoves.some(m => m.id === "swordsdance");
  const hasDD = availableMoves.some(m => m.id === "dragondance");
  const hasSS = availableMoves.some(m => m.id === "shellsmash");
  const hasNP = availableMoves.some(m => m.id === "nastyplot");

  // Determine if physical or special attacker based on stats
  const isPhysical = p.atk > p.spa;
  let setupType = "none";
  if (hasQD) setupType = "qd";
  else if (hasSS) setupType = "ss";
  else if (isPhysical) {
    if (hasDD) setupType = "dd";
    else if (hasSD) setupType = "sd";
    else if (hasBU) setupType = "bu";
  } else {
    if (hasNP) setupType = "np";
    else if (hasCM) setupType = "cm";
  }
  // Fallback: physical mons can use CM if no physical setup, vice versa
  if (setupType === "none") {
    if (isPhysical && (hasSD || hasBU || hasDD)) setupType = hasDD ? "dd" : hasSD ? "sd" : "bu";
    else if (!isPhysical && (hasCM || hasNP)) setupType = hasNP ? "np" : "cm";
    else if (hasBU) setupType = "bu";
    else if (hasCM) setupType = "cm";
  }

  // Find recovery
  const hasReliableRecovery = availableMoves.some(m => m.role === "recovery");
  const hasRest = availableMoves.some(m => m.role === "rest");
  const hasDrain = availableMoves.filter(m => m.role === "drain");
  const hasLeechSeed = availableMoves.some(m => m.role === "passive_sustain");

  // Get attacking moves sorted by effective power potential
  const attackMoves = availableMoves.filter(m => m.bp > 0 && (m.cat === "P" || m.cat === "S"))
    .filter(m => isPhysical ? m.cat === "P" : m.cat === "S" || m.bp >= 80) // Prefer matching category
    .sort((a, b) => b.bp - a.bp);

  // Get STAB types
  const stab = p.types;

  return {
    id: pid,
    name: p.name,
    types: p.types,
    hp: p.hp, atk: p.atk, def: p.def, spa: p.spa, spd: p.spd, spe: p.spe,
    ability: bestAbility,
    abilityInfo,
    stab,
    setupType,
    isPhysical,
    hasReliableRecovery,
    hasRest,
    hasDrain,
    hasLeechSeed,
    attackMoves,
    allMoves: availableMoves,
  };
}

// ─── SCORING ENGINE ───
function scoreCounter(c, bossTypes, teraType, bossStyle, raidMode, bossMoves) {
  if (!c) return { total: 0 };
  const effTypes = teraType ? [teraType] : bossTypes;
  const bossAtkTypes = bossMoves
    ? [...new Set(bossMoves.filter(m => m.bp > 0).map(m => m.type))]
    : bossTypes;

  // OFFENSE: find best move power vs boss (BP × STAB × effectiveness)
  let bestMovePower = 0;
  let bestMoveName = "";
  let bestStabSE = false;
  for (const m of c.attackMoves) {
    const eff = getEff(m.type, effTypes);
    const isSTAB = c.stab.includes(m.type);
    // Technician boost
    let bp = m.bp;
    if (c.abilityInfo.techBoost && bp <= 60) bp = Math.floor(bp * 1.5);
    // Iron Fist boost for punch moves
    if (c.abilityInfo.punchBoost && m.name.toLowerCase().includes("punch")) bp = Math.floor(bp * 1.2);
    // Adaptability STAB
    const stabMult = isSTAB ? (c.abilityInfo.adaptability ? 2.0 : 1.5) : 1.0;
    // Contrary + Leaf Storm: treat as repeatable +2 SpA
    if (c.abilityInfo.contrary && m.id === "leafstorm") bp = Math.floor(bp * 1.8);
    const power = bp * stabMult * eff;
    if (power > bestMovePower) { bestMovePower = power; bestMoveName = m.name; }
    if (isSTAB && eff >= 2) bestStabSE = true;
  }

  // Tier effective power
  let offScore;
  if (bestMovePower >= 300) offScore = 12;
  else if (bestMovePower >= 240) offScore = 11;
  else if (bestMovePower >= 200) offScore = 10;
  else if (bestMovePower >= 160) offScore = 8;
  else if (bestMovePower >= 130) offScore = 6;
  else if (bestMovePower >= 100) offScore = 4;
  else if (bestMovePower >= 60) offScore = 2;
  else offScore = 0;

  // BASE STAT SCALING
  let rawDmgBonus = 0;
  const statVal = c.isPhysical ? c.atk : c.spa;
  // Ability multipliers
  let effectiveStat = statVal;
  if (c.abilityInfo.atkMult && c.isPhysical) effectiveStat *= c.abilityInfo.atkMult;
  if (c.abilityInfo.spaMult && !c.isPhysical) effectiveStat *= c.abilityInfo.spaMult;
  if (effectiveStat >= 160) rawDmgBonus = 7;
  else if (effectiveStat >= 140) rawDmgBonus = 6;
  else if (effectiveStat >= 130) rawDmgBonus = 5;
  else if (effectiveStat >= 120) rawDmgBonus = 4;
  else if (effectiveStat >= 110) rawDmgBonus = 3;
  else if (effectiveStat >= 100) rawDmgBonus = 2;
  else if (effectiveStat >= 90) rawDmgBonus = 1;

  // DEFENSE: type effectiveness of boss attacks against us
  let worstEff = 0;
  for (const bt of bossAtkTypes) {
    let eff = getEff(bt, c.types);
    if (c.abilityInfo.typeImmune === bt) eff = 0;
    if (c.abilityInfo.resistType?.includes(bt)) eff *= 0.5;
    worstEff = Math.max(worstEff, eff);
  }
  let defScore = worstEff === 0 ? 10 : worstEff <= 0.25 ? 9 : worstEff <= 0.5 ? 7 : worstEff <= 1 ? 5 : worstEff <= 2 ? 3 : 1;

  // ABILITY BONUSES
  let abilityOffBonus = 0;
  let abilityDefBonus = 0;
  let abilityHealBonus = 0;
  if (c.abilityInfo.offBoost) abilityOffBonus += c.abilityInfo.offBoost;
  if (c.abilityInfo.toxicChain) abilityOffBonus += (raidMode === "group" ? 3 : 2);
  if (c.abilityInfo.snowball) abilityOffBonus += (raidMode === "group" ? 2 : 1);
  if (c.abilityInfo.contactDmg && bossStyle === "physical") abilityDefBonus += 2;
  if (c.abilityInfo.contactBurn && bossStyle === "physical") abilityDefBonus += 2;
  if (c.abilityInfo.dmgReduction) abilityDefBonus += 3;
  if (c.abilityInfo.defMult) abilityDefBonus += 2;
  if (c.abilityInfo.noChipDmg) abilityOffBonus += 1;
  if (c.abilityInfo.sereneGrace) abilityDefBonus += 2;
  if (c.abilityInfo.magicBounce) abilityDefBonus += 1;
  if (c.abilityInfo.statusImmune) abilityDefBonus += 1;
  if (c.abilityInfo.typeImmune && bossAtkTypes.includes(c.abilityInfo.typeImmune)) abilityDefBonus += 4;
  if (c.abilityInfo.passiveHeal) {
    if (c.abilityInfo.passiveHeal >= 12) abilityHealBonus += 3;
    else if (c.abilityInfo.passiveHeal >= 6) abilityHealBonus += 1;
  }

  // SETUP
  let setupScore = 0;
  if (c.setupType === "qd" || c.setupType === "ss") setupScore = 7;
  else if (["cm","np"].includes(c.setupType)) setupScore = bossStyle === "special" ? 7 : bossStyle === "physical" ? 3 : 5;
  else if (["bu","sd","dd"].includes(c.setupType)) setupScore = bossStyle === "physical" ? 7 : bossStyle === "special" ? 3 : 5;

  // SUSTAIN
  let sustainScore = 0;
  if (c.hasLeechSeed) sustainScore += 5;
  if (c.hasReliableRecovery) sustainScore += 4;
  else if (c.hasRest) sustainScore += 2;
  // Drain moves scored by matchup
  let bestDrainScore = 0;
  for (const m of c.hasDrain) {
    const eff = getEff(m.type, effTypes);
    const isSTAB = c.stab.includes(m.type);
    let d = 0;
    if (isSTAB && eff >= 2) d = 3;
    else if (eff >= 2) d = 2;
    else if (isSTAB && eff >= 1) d = 1;
    bestDrainScore = Math.max(bestDrainScore, d);
  }
  sustainScore += bestDrainScore;

  // BULK
  let bulkProduct;
  if (bossStyle === "special") bulkProduct = c.hp * c.spd * Math.max(c.spd, c.def);
  else if (bossStyle === "physical") bulkProduct = c.hp * c.def * Math.max(c.def, c.spd);
  else bulkProduct = c.hp * c.def * c.spd;
  const bulkScore = Math.min(5, Math.round(bulkProduct / 400000 * 5));

  // IMMUNITY (full moveset check)
  let immunityBonus = 0;
  let fullImmune = false;
  if (bossMoves && bossMoves.length > 0) {
    const atkMoves = bossMoves.filter(m => m.bp > 0);
    if (atkMoves.length > 0) {
      const immuneToAll = atkMoves.every(m => {
        let eff = getEff(m.type, c.types);
        if (c.abilityInfo.typeImmune === m.type) eff = 0;
        return eff === 0;
      });
      if (immuneToAll) {
        fullImmune = true;
        immunityBonus = 25;
      } else {
        const immuneCount = atkMoves.filter(m => {
          let eff = getEff(m.type, c.types);
          if (c.abilityInfo.typeImmune === m.type) eff = 0;
          return eff === 0;
        }).length;
        immunityBonus = immuneCount * 4;
      }
    }
  } else {
    for (const bt of bossAtkTypes) {
      let eff = getEff(bt, c.types);
      if (c.abilityInfo.typeImmune === bt) eff = 0;
      if (eff === 0) immunityBonus += 3;
    }
  }
  if (fullImmune) { sustainScore = 0; abilityHealBonus = 0; }

  // WEIGHTS
  let wOff, wDef, wSetup, wSustain, wBulk;
  if (raidMode === "solo") { wOff = 4.0; wDef = 1.5; wSetup = 1.5; wSustain = 0.5; wBulk = 0.8; }
  else { wOff = 2.0; wDef = 2.0; wSetup = 1.5; wSustain = 1.2; wBulk = 1.5; }

  const total = ((offScore + abilityOffBonus) * wOff) + (rawDmgBonus * (raidMode === "solo" ? 3 : 1.5)) +
    ((defScore + abilityDefBonus) * wDef) + (setupScore * wSetup) +
    ((sustainScore + abilityHealBonus) * wSustain) + (bulkScore * wBulk) + immunityBonus;

  return {
    total: Math.round(total * 10) / 10, offense: offScore, abilityOff: abilityOffBonus,
    defense: defScore, abilityDef: abilityDefBonus, setup: setupScore,
    sustain: sustainScore, abilityHeal: abilityHealBonus, bulk: bulkScore,
    immunity: immunityBonus, bestMovePower: Math.round(bestMovePower),
    bestMoveName, defMult: worstEff, hasStabSE: bestStabSE, rawDmgBonus, fullImmune,
  };
}

// ─── RECOMMEND MOVESET ───
function recommendMoves(counter, bossTypes, teraType) {
  const effTypes = teraType ? [teraType] : bossTypes;
  const moves = [];

  // 1. Setup move
  const setupMoves = counter.allMoves.filter(m => m.role.startsWith("setup"));
  if (setupMoves.length > 0) {
    const best = counter.setupType.includes("cm") || counter.setupType === "np"
      ? setupMoves.find(m => ["calmmind","nastyplot"].includes(m.id))
      : counter.setupType === "qd" ? setupMoves.find(m => m.id === "quiverdance")
      : counter.setupType === "dd" ? setupMoves.find(m => m.id === "dragondance")
      : counter.setupType === "sd" ? setupMoves.find(m => m.id === "swordsdance")
      : counter.setupType === "ss" ? setupMoves.find(m => m.id === "shellsmash")
      : setupMoves[0];
    if (best) moves.push({ ...best, slot: "setup" });
  }

  // 2. Best STAB attacking move
  const stabAttacks = counter.attackMoves
    .filter(m => counter.stab.includes(m.type))
    .sort((a, b) => {
      const aEff = a.bp * getEff(a.type, effTypes) * 1.5;
      const bEff = b.bp * getEff(b.type, effTypes) * 1.5;
      return bEff - aEff;
    });
  if (stabAttacks[0]) moves.push({ ...stabAttacks[0], slot: "stab" });

  // 3. Best coverage move (different type from STAB, SE preferred)
  const coverageMoves = counter.attackMoves
    .filter(m => !counter.stab.includes(m.type))
    .sort((a, b) => {
      const aEff = a.bp * getEff(a.type, effTypes);
      const bEff = b.bp * getEff(b.type, effTypes);
      return bEff - aEff;
    });
  if (coverageMoves[0] && getEff(coverageMoves[0].type, effTypes) >= 2) {
    moves.push({ ...coverageMoves[0], slot: "coverage" });
  } else if (stabAttacks[1] && !moves.find(m => m.id === stabAttacks[1].id)) {
    moves.push({ ...stabAttacks[1], slot: "stab2" });
  } else if (coverageMoves[0]) {
    moves.push({ ...coverageMoves[0], slot: "coverage" });
  }

  // 4. Sustain move
  if (counter.hasLeechSeed) {
    const ls = counter.allMoves.find(m => m.id === "leechseed");
    if (ls) moves.push({ ...ls, slot: "sustain" });
  } else if (counter.hasReliableRecovery) {
    const rec = counter.allMoves.find(m => m.role === "recovery");
    if (rec) moves.push({ ...rec, slot: "sustain" });
  } else if (counter.hasDrain.length > 0 && !moves.find(m => m.id === counter.hasDrain[0].id)) {
    moves.push({ ...counter.hasDrain[0], slot: "drain" });
  } else if (counter.hasRest) {
    const rest = counter.allMoves.find(m => m.id === "rest");
    if (rest) moves.push({ ...rest, slot: "sustain" });
  }

  return moves.slice(0, 4);
}

// ─── UI COMPONENTS ───
const TypeBadge = ({ type, small, onClick, selected }) => (
  <span onClick={onClick} style={{ display:"inline-block", padding: small ? "2px 7px" : "4px 11px", borderRadius:"4px", background: TC[type] || "#888", color: ["Electric","Ground","Ice","Steel","Normal"].includes(type) ? "#222" : "#fff", fontSize: small ? "10px" : "12px", fontWeight:700, letterSpacing:"0.6px", textTransform:"uppercase", cursor: onClick ? "pointer" : "default", border: selected ? "2px solid #fff" : "2px solid transparent", transition:"all 0.15s" }}>{type}</span>
);

const ScoreBar = ({ label, value, max, color, bonus }) => (
  <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"3px" }}>
    <span style={{ fontSize:"10px", color:"#7a756e", minWidth:"55px", textAlign:"right" }}>{label}</span>
    <div style={{ flex:1, height:"7px", background:"rgba(255,255,255,0.05)", borderRadius:"3px", overflow:"hidden" }}>
      <div style={{ width:`${Math.min(100, (value/max)*100)}%`, height:"100%", background:color, borderRadius:"3px", transition:"width 0.3s" }} />
    </div>
    <span style={{ fontSize:"10px", color:"#e0dcd6", minWidth:"18px" }}>{value}</span>
    {bonus > 0 && <span style={{ fontSize:"9px", color:"#ffd700", fontWeight:700 }}>+{bonus}</span>}
  </div>
);

// ─── MAIN APP ───
function App() {
  const { data, loading, error } = useDataLoader("./data");
  const [search, setSearch] = useState("");
  const [selectedBoss, setSelectedBoss] = useState(null);
  const [teraType, setTeraType] = useState("");
  const [showDD, setShowDD] = useState(false);
  const [useManual, setUseManual] = useState(false);
  const [manualTypes, setManualTypes] = useState([]);
  const [bossStyle, setBossStyle] = useState("mixed");
  const [raidMode, setRaidMode] = useState("solo");
  const [starLevel, setStarLevel] = useState(6);

  // Build pokemon name list for search
  const pokemonNames = useMemo(() => {
    if (!data) return [];
    return Object.entries(data.pokemon)
      .filter(([pid, p]) => {
        const bst = p.hp + p.atk + p.def + p.spa + p.spd + p.spe;
        return bst >= 200; // Filter out super weak forms
      })
      .map(([pid, p]) => p.name)
      .sort();
  }, [data]);

  const filtered = useMemo(() => {
    if (!search || search.length < 1) return [];
    const s = search.toLowerCase();
    return pokemonNames.filter(n => n.toLowerCase().includes(s)).slice(0, 12);
  }, [search, pokemonNames]);

  // Boss info
  const bossTypes = useMemo(() => {
    if (useManual) return manualTypes;
    if (!selectedBoss || !data) return [];
    const pid = selectedBoss.toLowerCase().replace(/[^a-z0-9]/g, '');
    // Try exact match first, then search
    for (const [id, p] of Object.entries(data.pokemon)) {
      if (p.name === selectedBoss) return p.types;
    }
    return data.pokemon[pid]?.types || [];
  }, [selectedBoss, data, useManual, manualTypes]);

  const bossMoveset = useMemo(() =>
    selectedBoss && data ? getBossMoveset(data.boss, selectedBoss, starLevel) : null,
  [selectedBoss, data, starLevel]);

  const autoBossStyle = useMemo(() => bossMoveset ? detectBossStyle(bossMoveset) : null, [bossMoveset]);

  // Auto-set boss style when boss selected
  const selectBoss = (name) => {
    setSelectedBoss(name);
    setSearch(name);
    setShowDD(false);
    setTeraType("");
    setUseManual(false);
    const ms = data ? getBossMoveset(data.boss, name, starLevel) : null;
    if (ms) setBossStyle(detectBossStyle(ms));
  };

  // Build all counters and score them
  const results = useMemo(() => {
    if (!data || !bossTypes || bossTypes.length === 0) return [];

    const counters = [];
    for (const [pid, poke] of Object.entries(data.pokemon)) {
      const learnset = data.learnsets[pid];
      if (!learnset) continue;
      const counter = buildCounter(pid, data.pokemon, data.moves, learnset, data.abilities, data.tags);
      if (!counter) continue;
      // Must have at least 1 attacking move
      if (counter.attackMoves.length === 0) continue;
      const score = scoreCounter(counter, bossTypes, teraType || null, bossStyle, raidMode, bossMoveset);
      if (score.total <= 0) continue;
      const recMoves = recommendMoves(counter, bossTypes, teraType || null);
      counters.push({ ...counter, score, recMoves });
    }

    return counters.sort((a, b) => b.score.total - a.score.total).slice(0, 50);
  }, [data, bossTypes, teraType, bossStyle, raidMode, bossMoveset]);

  if (loading) return (
    <div style={{ fontFamily:"'Courier New',monospace", background:"#1e1b18", color:"#ebe7e1", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:"32px", fontWeight:900, color:"#56ab2f", marginBottom:"16px" }}>COBBLEVERSE</div>
        <div style={{ fontSize:"14px", color:"#7a756e" }}>Loading Pokémon database...</div>
      </div>
    </div>
  );

  if (error) return (
    <div style={{ fontFamily:"'Courier New',monospace", background:"#1e1b18", color:"#ebe7e1", minHeight:"100vh", padding:"40px", textAlign:"center" }}>
      <div style={{ fontSize:"18px", color:"#C22E28", marginBottom:"12px" }}>Failed to load data</div>
      <div style={{ fontSize:"12px", color:"#7a756e" }}>{error}</div>
      <div style={{ fontSize:"12px", color:"#7a756e", marginTop:"12px" }}>Make sure JSON files are in ./data/ directory</div>
    </div>
  );

  const toggleManualType = (t) => {
    setManualTypes(prev => prev.includes(t) ? prev.filter(x => x !== t) : prev.length < 2 ? [...prev, t] : [prev[1], t]);
    setUseManual(true); setSelectedBoss(null);
  };

  return (
    <div style={{ fontFamily:"'Courier New','Consolas',monospace", background:"#1e1b18", color:"#ebe7e1", minHeight:"100vh", padding:"16px" }}>
      <div style={{ maxWidth:"900px", margin:"0 auto" }}>
        <div style={{ textAlign:"center", marginBottom:"24px" }}>
          <h1 style={{ fontSize:"26px", fontWeight:900, letterSpacing:"4px", color:"#56ab2f", margin:0 }}>COBBLEVERSE</h1>
          <div style={{ fontSize:"12px", letterSpacing:"3px", color:"#7a756e", marginTop:"4px" }}>RAID COUNTER ANALYZER — FULL NATIONAL DEX</div>
          <div style={{ fontSize:"10px", color:"#3a3530", marginTop:"4px" }}>{pokemonNames.length} Pokémon · {Object.keys(data.moves).length} Moves · {Object.keys(data.abilities).length} Abilities</div>
        </div>

        <div style={{ marginBottom:"20px", background:"rgba(255,255,255,0.02)", borderRadius:"12px", padding:"16px", border:"1px solid rgba(255,255,255,0.04)" }}>
          <div style={{ position:"relative" }}>
            <input
              value={search} onChange={e => { setSearch(e.target.value); setShowDD(true); if (!e.target.value) setSelectedBoss(null); }}
              onFocus={() => setShowDD(true)}
              placeholder="Search Pokémon by name..."
              style={{ width:"100%", padding:"12px 16px", borderRadius:"8px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#ebe7e1", fontSize:"16px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
            />
            {showDD && filtered.length > 0 && (
              <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#252220", border:"1px solid rgba(86,171,47,0.3)", borderRadius:"0 0 8px 8px", zIndex:10, maxHeight:"300px", overflow:"auto" }}>
                {filtered.map(name => {
                  const pid = name.toLowerCase().replace(/[^a-z0-9]/g, '');
                  const pTypes = data.pokemon[Object.keys(data.pokemon).find(k => data.pokemon[k].name === name)]?.types || [];
                  return (
                    <div key={name} onClick={() => selectBoss(name)} style={{ padding:"10px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:"8px", borderBottom:"1px solid rgba(255,255,255,0.03)" }}
                      onMouseEnter={e => e.target.style.background = "rgba(86,171,47,0.1)"}
                      onMouseLeave={e => e.target.style.background = "transparent"}>
                      <span style={{ fontWeight:700, fontSize:"14px" }}>{name}</span>
                      <div style={{ display:"flex", gap:"2px" }}>{pTypes.map(t => <TypeBadge key={t} type={t} small />)}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Manual type selector */}
          <div style={{ marginTop:"10px" }}>
            <div style={{ fontSize:"10px", color:"#5a5550", marginBottom:"6px" }}>Or select types manually:</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"3px" }}>
              {TYPES.map(t => <TypeBadge key={t} type={t} small onClick={() => toggleManualType(t)} selected={manualTypes.includes(t) && useManual} />)}
            </div>
          </div>

          {/* Tera type */}
          {bossTypes.length > 0 && (
            <div style={{ marginTop:"10px" }}>
              <div style={{ fontSize:"10px", color:"#5a5550", marginBottom:"6px" }}>Tera Type (optional):</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"3px" }}>
                {TYPES.map(t => <TypeBadge key={t} type={t} small onClick={() => setTeraType(teraType === t ? "" : t)} selected={teraType === t} />)}
              </div>
            </div>
          )}

          {/* Controls row */}
          <div style={{ display:"flex", gap:"20px", marginTop:"14px", flexWrap:"wrap" }}>
            <div>
              <label style={{ fontSize:"10px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>RAID STARS</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[[5,"5★ Lv75","#A8A77A"],[6,"6★ Lv90","#ffd700"],[7,"7★ Lv100","#C22E28"]].map(([s,l,col]) => (
                  <button key={s} onClick={() => setStarLevel(s)} style={{ padding:"6px 12px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: starLevel===s ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: starLevel===s ? `${col}22` : "transparent", color: starLevel===s ? col : "#7a756e", fontSize:"11px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:"10px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>BOSS ATTACKS {autoBossStyle && <span style={{color:"#5a5550",fontWeight:400}}>(auto: {autoBossStyle})</span>}</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["physical","⚔ Phys","#C22E28"],["special","✦ Spec","#6390F0"],["mixed","◆ Mix","#A8A77A"]].map(([s,l,col]) => (
                  <button key={s} onClick={() => setBossStyle(s)} style={{ padding:"6px 12px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: bossStyle===s ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: bossStyle===s ? `${col}22` : "transparent", color: bossStyle===s ? col : "#7a756e", fontSize:"11px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:"10px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>RAID MODE</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["solo","Solo","#ffd700"],["group","Group","#56ab2f"]].map(([m,l,col]) => (
                  <button key={m} onClick={() => setRaidMode(m)} style={{ padding:"6px 12px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: raidMode===m ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: raidMode===m ? `${col}22` : "transparent", color: raidMode===m ? col : "#7a756e", fontSize:"11px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Boss info card */}
          {bossTypes.length > 0 && (
            <div style={{ marginTop:"14px", padding:"12px 16px", background:"rgba(0,0,0,0.2)", borderRadius:"8px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap", marginBottom: bossMoveset ? "10px" : 0 }}>
                <span style={{ fontWeight:700, fontSize:"16px" }}>{selectedBoss || "Custom"}</span>
                <div style={{ display:"flex", gap:"3px" }}>{bossTypes.map(t => <TypeBadge key={t} type={t} />)}</div>
                {teraType && <><span style={{ fontSize:"10px", color:"#7a756e" }}>TERA→</span><TypeBadge type={teraType} /><span style={{ fontSize:"10px", color:"#5a5550" }}>(def as {teraType})</span></>}
              </div>
              {bossMoveset && (
                <div>
                  <div style={{ fontSize:"10px", letterSpacing:"1px", color:"#C22E28", fontWeight:700, marginBottom:"6px" }}>BOSS MOVESET (Lv{starLevel >= 7 ? 100 : starLevel >= 6 ? 90 : 75})</div>
                  <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                    {bossMoveset.map((m, i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:"4px", padding:"4px 8px", borderRadius:"5px", background:"rgba(194,46,40,0.08)", border:"1px solid rgba(194,46,40,0.15)" }}>
                        <span style={{ display:"inline-block", padding:"1px 5px", borderRadius:"3px", background:TC[m.type]||"#555", color:["Electric","Ground","Ice","Steel","Normal"].includes(m.type)?"#222":"#fff", fontSize:"9px", fontWeight:800, letterSpacing:"0.5px", textTransform:"uppercase", minWidth:"28px", textAlign:"center" }}>{m.type}</span>
                        <span style={{ fontSize:"12px", fontWeight:600, color:"#e0dcd6" }}>{m.name}</span>
                        {m.bp > 0 && <span style={{ fontSize:"10px", color: m.cat==="P" ? "#C22E28" : "#6390F0", fontWeight:700 }}>{m.bp}{m.cat==="P"?"⚔":"✦"}</span>}
                        {m.bp === 0 && <span style={{ fontSize:"10px", color:"#7a756e" }}>status</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Results */}
        {results.length > 0 && (
          <div>
            <div style={{ fontSize:"11px", letterSpacing:"2px", color:"#56ab2f", fontWeight:700, marginBottom:"12px", paddingBottom:"6px", borderBottom:"1px solid rgba(86,171,47,0.15)" }}>
              TOP COUNTERS — {raidMode === "solo" ? "SOLO" : "GROUP"} — {bossStyle === "physical" ? "VS PHYSICAL" : bossStyle === "special" ? "VS SPECIAL" : "VS MIXED"}
            </div>
            {results.map((c, i) => (
              <div key={c.id} style={{ background: i === 0 ? "linear-gradient(135deg, rgba(86,171,47,0.08), rgba(255,215,0,0.04))" : "rgba(255,255,255,0.015)", border: i === 0 ? "1px solid rgba(86,171,47,0.3)" : "1px solid rgba(255,255,255,0.04)", borderRadius:"10px", padding:"16px", marginBottom:"12px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"10px", flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"monospace", fontSize:"18px", fontWeight:900, color: i === 0 ? "#ffd700" : i < 3 ? "#56ab2f" : "#5a5550", minWidth:"28px" }}>#{i+1}</span>
                  <span style={{ fontWeight:800, fontSize:"16px", color:"#ebe7e1" }}>{c.name}</span>
                  <div style={{ display:"flex", gap:"2px" }}>{c.types.map(t => <TypeBadge key={t} type={t} small />)}</div>
                  <span style={{ fontSize:"10px", padding:"2px 6px", borderRadius:"3px", background: ["cm","np"].includes(c.setupType)?"rgba(99,144,240,0.2)":["bu","sd","dd"].includes(c.setupType)?"rgba(194,46,40,0.2)":c.setupType==="qd"||c.setupType==="ss"?"rgba(249,85,135,0.2)":"rgba(255,255,255,0.05)", color: ["cm","np"].includes(c.setupType)?"#6390F0":["bu","sd","dd"].includes(c.setupType)?"#C22E28":c.setupType==="qd"||c.setupType==="ss"?"#F95587":"#777", fontWeight:700 }}>
                    {({cm:"CM",np:"NP",bu:"BU",sd:"SD",dd:"DD",qd:"QD",ss:"SS",none:"—"})[c.setupType]}
                  </span>
                  <span style={{ fontSize:"10px", color:"#5a5550" }}>{c.ability}</span>
                  {c.score.hasStabSE && <span style={{ fontSize:"9px", padding:"2px 5px", borderRadius:"3px", background:"rgba(255,215,0,0.15)", color:"#ffd700", fontWeight:800 }}>★ STAB SE</span>}
                  {c.score.fullImmune && <span style={{ fontSize:"9px", padding:"2px 5px", borderRadius:"3px", background:"rgba(0,229,255,0.2)", color:"#00e5ff", fontWeight:800 }}>🛡 IMMUNE</span>}
                  <span style={{ marginLeft:"auto", fontWeight:900, fontSize:"18px", color: i === 0 ? "#ffd700" : "#56ab2f" }}>{c.score.total}</span>
                </div>

                {/* Recommended moveset */}
                <div style={{ display:"flex", gap:"4px", marginBottom:"10px", flexWrap:"wrap" }}>
                  {c.recMoves.map((m, j) => (
                    <div key={j} style={{ display:"flex", alignItems:"center", gap:"3px", padding:"3px 7px", borderRadius:"4px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)" }}>
                      <span style={{ display:"inline-block", padding:"1px 4px", borderRadius:"2px", background:TC[m.type]||"#555", color:["Electric","Ground","Ice","Steel","Normal"].includes(m.type)?"#222":"#fff", fontSize:"8px", fontWeight:800, textTransform:"uppercase" }}>{m.type}</span>
                      <span style={{ fontSize:"11px", fontWeight:600 }}>{m.name}</span>
                      {m.bp > 0 && <span style={{ fontSize:"9px", color:"#7a756e" }}>{m.bp}</span>}
                    </div>
                  ))}
                </div>

                {/* Score bars */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px 16px" }}>
                  <ScoreBar label="Offense" value={c.score.offense} max={12} color="#EE8130" bonus={c.score.abilityOff} />
                  <ScoreBar label="Defense" value={c.score.defense} max={10} color="#6390F0" bonus={c.score.abilityDef} />
                  <ScoreBar label="Setup" value={c.score.setup} max={7} color="#F95587" />
                  <ScoreBar label="Sustain" value={c.score.sustain} max={12} color="#7AC74C" bonus={c.score.abilityHeal} />
                  <ScoreBar label="Bulk" value={c.score.bulk} max={5} color="#B7B7CE" />
                  <ScoreBar label="Power" value={c.score.rawDmgBonus} max={7} color="#ff6b6b" />
                  {c.score.immunity > 0 && <ScoreBar label={c.score.fullImmune ? "IMMUNE!" : "Immune"} value={c.score.immunity} max={25} color="#00e5ff" />}
                </div>

                {/* Best move + typing info */}
                <div style={{ display:"flex", gap:"16px", marginTop:"8px", fontSize:"11px", flexWrap:"wrap" }}>
                  <div><span style={{ color:"#7a756e" }}>Best Move: </span>
                    <span style={{ color: c.score.bestMovePower >= 300 ? "#ffd700" : c.score.bestMovePower >= 200 ? "#ff8844" : "#aaa", fontWeight:800 }}>
                      {c.score.bestMoveName} ({c.score.bestMovePower} pwr)
                    </span>
                  </div>
                  <div><span style={{ color:"#7a756e" }}>Stats: </span>
                    <span style={{ color:"#e0dcd6" }}>{c.hp}/{c.atk}/{c.def}/{c.spa}/{c.spd}/{c.spe}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop:"28px", textAlign:"center", fontSize:"10px", color:"#3a3530", paddingTop:"12px", borderTop:"1px solid rgba(255,255,255,0.04)", lineHeight:1.8 }}>
          <span style={{color:"#7AC74C"}}>Sustain</span>: Leech Seed=5 &gt; Recover/Roost=4 &gt; Rest=2 · Drain scales with matchup: STAB+SE +3, SE +2, STAB neutral +1
          <br/><span style={{color:"#EE8130"}}>Offense</span>: BP × STAB(1.5×) × effectiveness · <span style={{color:"#ff6b6b"}}>Power</span>: base Atk/SpA stat scaling
          <br/>Solo: Offense ×4 + Power ×3 · Group: Sustain ×1.2 + Defense ×2 · Full moveset immunity: +25
          <br/>Data: Pokémon Showdown (Gen 9→8→7 fallback for Cobblemon compatibility)
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
