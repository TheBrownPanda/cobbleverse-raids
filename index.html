// ─── MOVE RECOMMENDATION ───
function recommendMoves(c, bossTypes, teraType) {
  const effTypes = teraType ? [teraType] : bossTypes;
  const picked = [], used = new Set();
  const pick = m => { if (!used.has(m.n)) { picked.push(m); used.add(m.n); } };
  const setup = c.moves.find(m => m.cat === "setup");
  if (setup) pick(setup);
  const leech = c.moves.find(m => m.n === "Leech Seed");
  const reliable = c.moves.find(m => ["Recover","Soft-Boiled","Slack Off","Moonlight","Synthesis","Roost","Wish"].includes(m.n));
  const drains = c.moves.filter(m => m.cat.includes("sustain") && m.cat.includes("stab") && !used.has(m.n));
  const rest = c.moves.find(m => m.n === "Rest");
  const sleepTalk = c.moves.find(m => m.n === "Sleep Talk");
  if (leech) pick(leech);
  if (reliable && !used.has(reliable.n)) pick(reliable);
  else if (drains.length > 0 && picked.length < 3) {
    const sorted = [...drains].sort((a,b) => getEff(b.t, effTypes) - getEff(a.t, effTypes));
    pick(sorted[0]);
  }
  if (picked.length < 2 && rest && !used.has(rest.n)) { pick(rest); if (sleepTalk && !used.has(sleepTalk.n)) pick(sleepTalk); }
  const offensive = c.moves.filter(m => !used.has(m.n) && (m.cat.includes("stab") || m.cat.includes("coverage")))
    .map(m => { let s = 0; const eff = getEff(m.t, effTypes); const isSTAB = c.stab.includes(m.t); if (isSTAB && eff >= 2) s += 100; else if (eff >= 2) s += 50; else if (isSTAB) s += 30; s += eff * 10; if (m.cat.includes("sustain")) s += 15; if (m.cat.includes("priority")) s += 8; return { ...m, score: s }; })
    .sort((a, b) => b.score - a.score);
  for (const m of offensive) { if (picked.length >= 4) break; pick(m); }
  while (picked.length < 4) picked.push({ n: "Flex", t: null, cat: "flex" });
  return picked.slice(0, 4);
}

// ─── SCORING ───
function scoreCounter(c, bossTypes, teraType, bossStyle, raidMode) {
  const effTypes = teraType ? [teraType] : bossTypes;
  let bestStabSE = 0, bestSE = 0, bestSTAB = 0;
  for (const st of c.stab) { const e = getEff(st, effTypes); if (e >= 2) bestStabSE = Math.max(bestStabSE, e); bestSTAB = Math.max(bestSTAB, e); }
  for (const cm of c.moves.filter(m => m.cat.includes("coverage") || m.cat.includes("stab"))) { const e = getEff(cm.t, effTypes); if (e >= 2) bestSE = Math.max(bestSE, e); }
  let offScore = bestStabSE >= 4 ? 12 : bestStabSE >= 2 ? 10 : bestSE >= 4 ? 8 : bestSE >= 2 ? 6 : bestSTAB >= 1 ? 4 : bestSTAB >= 0.5 ? 2 : 0;
  const rawDmgBonus = c.setupType !== "bu" ? Math.min(3, Math.round((c.spa - 80) / 25)) : 0;

  // ABILITY: offense bonuses
  let abilityOffBonus = 0;
  if (c.fx.some(f => f.type === "freeLifeOrb")) abilityOffBonus += 2; // 30% damage boost free
  if (c.fx.some(f => f.type === "contrary")) abilityOffBonus += 2; // Leaf Storm stacks
  if (c.fx.some(f => f.type === "techBoost")) abilityOffBonus += 1;
  if (c.fx.some(f => f.type === "ironFist")) abilityOffBonus += 1;
  if (c.fx.some(f => f.type === "gutsBurn")) abilityOffBonus += 2; // 50% Atk boost

  const bossAtkTypes = [...new Set([...bossTypes, ...(teraType ? [teraType] : [])])];
  const defM = getDefMult(bossAtkTypes, c.types);
  let defScore = defM === 0 ? 10 : defM <= 0.25 ? 9 : defM <= 0.5 ? 7 : defM <= 1 ? 5 : defM <= 2 ? 3 : 1;

  // ABILITY: defense bonuses
  let abilityDefBonus = 0;
  for (const f of c.fx) {
    if (f.type === "typeImmune" && bossAtkTypes.includes(f.val)) abilityDefBonus += 4; // ability immunity vs boss type
    if (f.type === "intimidate" && bossStyle !== "special") abilityDefBonus += 1; // only triggers once on entry in raids
    if (f.type === "dmgHalved") abilityDefBonus += 2;
    if (f.type === "reflectDrops") abilityDefBonus += 1;
    if (f.type === "blockBombs") abilityDefBonus += 1;
    if (f.type === "statusBlock" || f.type === "statusImmune") abilityDefBonus += 1;
    if (f.type === "magicBounce") abilityDefBonus += 1;
    if (f.type === "contactDmg") abilityDefBonus += (bossStyle === "physical" ? 2 : 1);
    if (f.type === "contactBurn" && bossStyle === "physical") abilityDefBonus += 2;
    if (f.type === "doubleSecondary") abilityDefBonus += 1; // flinch = pseudo-defense
  }
  // Justified/Defiant bonuses vs Dark bosses
  if (c.fx.some(f => f.type === "justified") && bossAtkTypes.includes("Dark")) abilityOffBonus += 2;
  if (c.fx.some(f => f.type === "defiant")) abilityOffBonus += 1;

  let setupScore = 0;
  if (c.setupType === "qd") setupScore = 7;
  else if (c.setupType === "cm") setupScore = bossStyle === "special" ? 7 : bossStyle === "physical" ? 3 : 5;
  else if (c.setupType === "bu") setupScore = bossStyle === "physical" ? 7 : bossStyle === "special" ? 3 : 5;
  // Note: Prankster/Speed Boost/Unburden don't help in raids (no speed mechanic, no switching)

  // SUSTAIN — includes ability-based healing
  const hasLeech = c.moves.some(m => m.n === "Leech Seed");
  const hasReliable = c.moves.some(m => ["Recover","Soft-Boiled","Slack Off","Moonlight","Synthesis","Roost","Wish"].includes(m.n));
  const hasDrain = c.moves.some(m => m.cat.includes("sustain") && m.cat.includes("stab"));
  const hasRest = c.moves.some(m => m.n === "Rest");
  let sustainScore = 0;
  if (hasLeech && hasReliable) sustainScore = 5;
  else if (hasLeech && hasDrain) sustainScore = 5;
  else if (hasLeech) sustainScore = 4;
  else if (hasReliable) sustainScore = 4;
  else if (hasDrain) sustainScore = 3;
  else if (hasRest) sustainScore = 2;

  // Ability passive healing bonus
  let abilityHealBonus = 0;
  const passiveHealFx = c.fx.filter(f => f.type === "passiveHeal");
  for (const ph of passiveHealFx) {
    if (ph.val >= 12) abilityHealBonus += 3; // Poison Heal
    else if (ph.val >= 6) abilityHealBonus += 1; // Leftovers/Black Sludge
  }
  // Regenerator doesn't help in raids (no switching)
  if (c.fx.some(f => f.type === "rainHeal") && bossAtkTypes.includes("Water")) abilityHealBonus += 2;
  // Rage Fist scaling = pseudo-offense bonus in long fights
  if (c.fx.some(f => f.type === "rageFist") && raidMode === "group") abilityOffBonus += 3;

  let bulkProduct;
  if (bossStyle === "special") bulkProduct = c.hp * c.spd * Math.max(c.spd, c.def);
  else if (bossStyle === "physical") bulkProduct = c.hp * c.def * Math.max(c.def, c.spd);
  else bulkProduct = c.hp * c.def * c.spd;
  const bulkScore = Math.min(5, Math.round(bulkProduct / 400000 * 5));

  let immunityBonus = 0;
  for (const bt of bossAtkTypes) { if (getEff(bt, c.types) === 0) immunityBonus += 3; }

  let wOff, wDef, wSetup, wSustain, wBulk;
  if (raidMode === "solo") { wOff = 4.0; wDef = 1.5; wSetup = 1.5; wSustain = 0.8; wBulk = 0.8; }
  else { wOff = 2.0; wDef = 2.0; wSetup = 1.5; wSustain = 2.0; wBulk = 1.5; }

  const total = ((offScore + abilityOffBonus) * wOff) + (rawDmgBonus * (raidMode === "solo" ? 2 : 0.5)) +
    ((defScore + abilityDefBonus) * wDef) + (setupScore * wSetup) +
    ((sustainScore + abilityHealBonus) * wSustain) + (bulkScore * wBulk) + immunityBonus;

  return { total: Math.round(total * 10) / 10, offense: offScore, abilityOff: abilityOffBonus, defense: defScore, abilityDef: abilityDefBonus, setup: setupScore, sustain: sustainScore, abilityHeal: abilityHealBonus, bulk: bulkScore, immunity: immunityBonus, bestOffMult: Math.max(bestStabSE, bestSE, bestSTAB), defMult: defM, hasStabSE: bestStabSE >= 2, rawDmgBonus };
}

              <div style={{ flex:"1 1 260px", position:"relative" }}>
                <label style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"4px" }}>RAID BOSS</label>
                <input type="text" value={search} placeholder="Pokémon name..." onChange={e => { setSearch(e.target.value); setSelectedBoss(null); setShowDD(true); }} onFocus={() => setShowDD(true)}
                  style={{ width:"100%", padding:"8px 12px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#e0dcd6", fontSize:"13px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
                {showDD && filtered.length > 0 && !selectedBoss && (
                  <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#1e1c18", border:"1px solid rgba(86,171,47,0.3)", borderRadius:"0 0 6px 6px", maxHeight:"260px", overflowY:"auto", zIndex:100 }}>
                    {filtered.map(name => (
                      <div key={name} onClick={() => selectBoss(name)} style={{ padding:"6px 12px", cursor:"pointer", display:"flex", alignItems:"center", gap:"6px", borderBottom:"1px solid rgba(255,255,255,0.04)", fontSize:"12px" }}
                        onMouseEnter={e => e.currentTarget.style.background="rgba(86,171,47,0.1)"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                        <span style={{ flex:1 }}>{name}</span>{pokemonDB[name].map(t => <TypeBadge key={t} type={t} small />)}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{ flex:"0 0 130px" }}>
                <label style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"4px" }}>TERA TYPE</label>
                <select value={teraType} onChange={e => setTeraType(e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#e0dcd6", fontSize:"12px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}>
                  <option value="">None</option>{TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </div>
          ) : (
            <div>
              <label style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>BOSS TYPES (1-2)</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"10px" }}>{TYPES.map(t => <TypeBadge key={t} type={t} onClick={() => toggleManualType(t)} selected={manualTypes.includes(t)} />)}</div>
              {manualTypes.length > 0 && <select value={teraType} onChange={e => setTeraType(e.target.value)} style={{ padding:"6px 10px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#e0dcd6", fontSize:"11px", fontFamily:"inherit", outline:"none" }}>
                <option value="">Tera: None</option>{TYPES.map(t => <option key={t} value={t}>Tera: {t}</option>)}
              </select>}
            </div>
          )}
          <div style={{ display:"flex", gap:"20px", marginTop:"12px", flexWrap:"wrap" }}>
            <div>
              <label style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>BOSS ATTACKS</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["physical","⚔ Phys","#C22E28"],["special","✦ Spec","#6390F0"],["mixed","◆ Mix","#A8A77A"]].map(([s,l,col]) => (
                  <button key={s} onClick={() => setBossStyle(s)} style={{ padding:"5px 10px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: bossStyle===s ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: bossStyle===s ? `${col}22` : "transparent", color: bossStyle===s ? col : "#7a756e", fontSize:"9px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:"9px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>RAID MODE</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["solo","Solo","#ffd700"],["group","Group","#56ab2f"]].map(([m,l,col]) => (
                  <button key={m} onClick={() => setRaidMode(m)} style={{ padding:"5px 10px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: raidMode===m ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: raidMode===m ? `${col}22` : "transparent", color: raidMode===m ? col : "#7a756e", fontSize:"9px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
          </div>
          {bossTypes && bossTypes.length > 0 && (
            <div style={{ marginTop:"12px", padding:"10px 14px", background:"rgba(0,0,0,0.2)", borderRadius:"6px", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
              <span style={{ fontWeight:700, fontSize:"14px" }}>{selectedBoss || "Custom"}</span>
              <div style={{ display:"flex", gap:"3px" }}>{bossTypes.map(t => <TypeBadge key={t} type={t} />)}</div>
              {teraType && <><span style={{ fontSize:"9px", color:"#7a756e" }}>TERA→</span><TypeBadge type={teraType} /><span style={{ fontSize:"8px", color:"#5a5550" }}>(def as {teraType}, STAB {[...new Set([...bossTypes,teraType])].join("+")})</span></>}
            </div>
          )}
        </div>

        {results.length > 0 && (
          <div>
            <div style={{ fontSize:"9px", letterSpacing:"2px", color:"#56ab2f", fontWeight:700, marginBottom:"10px", paddingBottom:"6px", borderBottom:"1px solid rgba(86,171,47,0.15)" }}>
              TOP COUNTERS — {raidMode === "solo" ? "SOLO (DAMAGE)" : "GROUP (SUSTAIN)"} — {bossStyle === "physical" ? "VS PHYSICAL" : bossStyle === "special" ? "VS SPECIAL" : "VS MIXED"}
            </div>
            {results.map((c, i) => (
              <div key={c.name} style={{ background: i === 0 ? "linear-gradient(135deg, rgba(86,171,47,0.08), rgba(255,215,0,0.04))" : "rgba(255,255,255,0.015)", border: i === 0 ? "1px solid rgba(86,171,47,0.3)" : "1px solid rgba(255,255,255,0.04)", borderRadius:"10px", padding:"14px", marginBottom:"10px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"10px", flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"monospace", fontSize:"16px", fontWeight:900, color: i === 0 ? "#ffd700" : i < 3 ? "#56ab2f" : "#5a5550", minWidth:"24px" }}>#{i+1}</span>
                  <span style={{ fontWeight:800, fontSize:"14px", color:"#e8e4de" }}>{c.name}</span>
                  <div style={{ display:"flex", gap:"2px" }}>{c.types.map(t => <TypeBadge key={t} type={t} small />)}</div>
                  <span style={{ fontSize:"8px", padding:"2px 5px", borderRadius:"3px", background:c.setupType==="cm"?"rgba(99,144,240,0.2)":c.setupType==="bu"?"rgba(194,46,40,0.2)":c.setupType==="qd"?"rgba(249,85,135,0.2)":"rgba(255,255,255,0.05)", color:c.setupType==="cm"?"#6390F0":c.setupType==="bu"?"#C22E28":c.setupType==="qd"?"#F95587":"#777", fontWeight:700 }}>
                    {c.setupType==="cm"?"CM":c.setupType==="bu"?"BU":c.setupType==="qd"?"QD":"WALL"}
                  </span>
                  {c.score.hasStabSE && <span style={{ fontSize:"7px", padding:"2px 5px", borderRadius:"3px", background:"rgba(255,215,0,0.15)", color:"#ffd700", fontWeight:800 }}>★ STAB SE</span>}
                  <span style={{ marginLeft:"auto", fontSize:"13px", fontWeight:900, color: c.score.total >= 50 ? "#ffd700" : c.score.total >= 38 ? "#56ab2f" : "#b0a8a0" }}>{c.score.total}</span>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"8px" }}>
                  <div>
                    <div style={{ fontSize:"8px", letterSpacing:"1px", color:"#56ab2f", fontWeight:700, marginBottom:"4px" }}>SCORES</div>
                    <ScoreBar label="Offense" value={c.score.offense} max={12} color={c.score.hasStabSE?"#ffd700":"#ff8844"} bonus={c.score.abilityOff} />
                    <ScoreBar label="Defense" value={c.score.defense} max={10} color="#6390F0" bonus={c.score.abilityDef} />
                    <ScoreBar label="Setup" value={c.score.setup} max={9} color="#F95587" />
                    <ScoreBar label="Sustain" value={c.score.sustain} max={5} color="#7AC74C" bonus={c.score.abilityHeal} />
                    <ScoreBar label="Bulk" value={c.score.bulk} max={5} color="#B7B7CE" />
                    {c.score.immunity > 0 && <ScoreBar label="Immune!" value={c.score.immunity} max={6} color="#00e5ff" />}
                  </div>
                  <div>
                    <div style={{ fontSize:"8px", letterSpacing:"1px", color:"#56ab2f", fontWeight:700, marginBottom:"4px" }}>MOVESET</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:"2px" }}>
                      {c.recMoves.map((m, j) => <MoveSlot key={j} move={m} index={j} counterStab={c.stab} effTypes={effTypes} />)}
                    </div>
                  </div>
                </div>

                {/* Ability/Item bar */}
                <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"6px" }}>
                  <span style={{ fontSize:"9px", padding:"3px 8px", borderRadius:"4px", background:"rgba(249,85,135,0.1)", border:"1px solid rgba(249,85,135,0.2)", color:"#F95587", fontWeight:700 }}>{c.ability}</span>
                  {c.item && <span style={{ fontSize:"9px", padding:"3px 8px", borderRadius:"4px", background:"rgba(255,215,0,0.1)", border:"1px solid rgba(255,215,0,0.2)", color:"#ffd700", fontWeight:700 }}>{c.item}</span>}
                </div>

                {/* Ability effects */}
                <div style={{ display:"flex", gap:"4px", flexWrap:"wrap", marginBottom:"6px" }}>
                  {c.fx.map((f, fi) => (
                    <span key={fi} style={{ fontSize:"8px", padding:"2px 6px", borderRadius:"3px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", color:"#b0a8a0" }}>{f.desc}</span>
                  ))}
                </div>

                <div style={{ display:"flex", gap:"12px", flexWrap:"wrap", fontSize:"10px", marginBottom:"4px", padding:"6px 8px", background:"rgba(0,0,0,0.15)", borderRadius:"4px" }}>
                  <div><span style={{ color:"#7a756e" }}>You→Boss: </span><EffLabel mult={c.score.bestOffMult} isStabSE={c.score.hasStabSE} /></div>
                  <div><span style={{ color:"#7a756e" }}>Boss→You: </span><EffLabel mult={c.score.defMult} /></div>
                </div>
                <div style={{ fontSize:"10px", color:"#9a9490", lineHeight:1.4 }}>{c.note}</div>
              </div>
            ))}
          </div>
        )}

        {(!bossTypes || bossTypes.length === 0) && (
          <div style={{ textAlign:"center", padding:"40px 20px", color:"#5a5550", fontSize:"12px" }}>
            <div style={{ fontSize:"28px", marginBottom:"10px", opacity:0.4 }}>⚔</div>
            Search for a raid boss or select types manually.
          </div>
        )}

        <div style={{ marginTop:"28px", textAlign:"center", fontSize:"8px", color:"#3a3530", paddingTop:"12px", borderTop:"1px solid rgba(255,255,255,0.04)", lineHeight:1.6 }}>
          Ability/Item bonuses shown as gold <span style={{color:"#ffd700"}}>+N</span> next to score bars · Poison Heal+Toxic Orb = +3 sustain · Magic Guard+Life Orb = +2 offense · Flash Fire/Dry Skin/Levitate = +4 def if boss has that type
          <br/>Solo: Offense ×4 · Group: Sustain ×2 · STAB SE = 10-12 pts · Tera: defends as Tera, attacks with all STAB
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
