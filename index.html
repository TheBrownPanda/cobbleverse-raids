// ─── MOVE RECOMMENDATION ───
function recommendMoves(c, bossTypes, teraType) {
  const effTypes = teraType ? [teraType] : bossTypes;
  const picked = [], used = new Set();
  const pick = m => { if (!used.has(m.n)) { picked.push(m); used.add(m.n); } };
  const setup = c.moves.find(m => m.cat === "setup");
  if (setup) pick(setup);
  const leech = c.moves.find(m => m.n === "Leech Seed");
  const reliable = c.moves.find(m => ["Recover","Soft-Boiled","Slack Off","Moonlight","Synthesis","Roost","Wish"].includes(m.n));
  const drains = c.moves.filter(m => m.cat.includes("sustain") && m.cat.includes("stab") && !used.has(m.n));
  const rest = c.moves.find(m => m.n === "Rest");
  const sleepTalk = c.moves.find(m => m.n === "Sleep Talk");
  if (leech) pick(leech);
  if (reliable && !used.has(reliable.n)) pick(reliable);
  else if (drains.length > 0 && picked.length < 3) {
    const sorted = [...drains].sort((a,b) => getEff(b.t, effTypes) - getEff(a.t, effTypes));
    pick(sorted[0]);
  }
  if (picked.length < 2 && rest && !used.has(rest.n)) { pick(rest); if (sleepTalk && !used.has(sleepTalk.n)) pick(sleepTalk); }
  const offensive = c.moves.filter(m => !used.has(m.n) && (m.cat.includes("stab") || m.cat.includes("coverage")))
    .map(m => { let s = 0; const eff = getEff(m.t, effTypes); const isSTAB = c.stab.includes(m.t); if (isSTAB && eff >= 2) s += 100; else if (eff >= 2) s += 50; else if (isSTAB) s += 30; s += eff * 10; if (m.cat.includes("sustain")) s += 15; if (m.cat.includes("priority")) s += 8; return { ...m, score: s }; })
    .sort((a, b) => b.score - a.score);
  for (const m of offensive) { if (picked.length >= 4) break; pick(m); }
  while (picked.length < 4) picked.push({ n: "Flex", t: null, cat: "flex" });
  return picked.slice(0, 4);
}

function getBossMoveset(pokemonName, starLevel) {
  const id = pokemonName.toLowerCase().replace(/[^a-z0-9]/g, '');
  const table = starLevel >= 7 ? BOSS_LVL100 : starLevel >= 6 ? BOSS_LVL90 : BOSS_LVL75;
  const indices = table[id];
  if (!indices || indices.length === 0) return null;
  return indices.map(i => {
    const m = BOSS_MOVES[i];
    return { name: m[0], cat: m[1], type: m[2], bp: m[3] };
  });
}

function detectBossStyle(moveset, pokemonName) {
  if (!moveset) return "mixed";
  let physPower = 0, specPower = 0;
  for (const m of moveset) {
    if (m.cat === "P" && m.bp > 0) physPower += m.bp;
    else if (m.cat === "S" && m.bp > 0) specPower += m.bp;
  }
  // If moveset is all status, use stats from pokemonDB forms data to guess
  if (physPower === 0 && specPower === 0) return "mixed";
  if (physPower > 0 && specPower === 0) return "physical";
  if (specPower > 0 && physPower === 0) return "special";
  if (physPower > specPower * 1.5) return "physical";
  if (specPower > physPower * 1.5) return "special";
  return "mixed";
}


// ─── SCORING ───
function scoreCounter(c, bossTypes, teraType, bossStyle, raidMode, bossMoves) {
  const effTypes = teraType ? [teraType] : bossTypes;
  // Calculate actual best move damage: BP × STAB(1.5) × effectiveness
  // This naturally handles Bullet Punch(40) vs Double Iron Bash(120) differences
  let bestMovePower = 0;
  let bestStabSE = false;
  for (const m of c.moves) {
    if (!m.t || m.cat === "setup" || m.cat === "sustain" || m.cat === "utility" || m.cat === "utility_rest") continue;
    const bp = MOVE_BP[m.n] || 0;
    if (bp === 0) continue;
    const eff = getEff(m.t, effTypes);
    const isSTAB = c.stab.includes(m.t);
    const power = bp * (isSTAB ? 1.5 : 1.0) * eff;
    if (power > bestMovePower) bestMovePower = power;
    if (isSTAB && eff >= 2) bestStabSE = true;
  }
  // Tier the effective power into an offense score
  // 270+ = e.g. 120BP STAB SE (120×1.5×2=360), or 90BP STAB 4xSE (90×1.5×4=540)
  // 180  = e.g. 120BP STAB neutral (120×1.5×1=180), or 90BP coverage SE (90×1×2=180)
  // 135  = e.g. 90BP STAB neutral (90×1.5=135)
  // 80   = e.g. 80BP coverage neutral (80×1=80)
  let offScore;
  if (bestMovePower >= 300) offScore = 12;
  else if (bestMovePower >= 240) offScore = 11;
  else if (bestMovePower >= 200) offScore = 10;
  else if (bestMovePower >= 160) offScore = 8;
  else if (bestMovePower >= 130) offScore = 6;
  else if (bestMovePower >= 100) offScore = 4;
  else if (bestMovePower >= 60) offScore = 2;
  else offScore = 0;
  // Base stat scaling: relevant attacking stat matters A LOT
  let rawDmgBonus = 0;
  if (c.setupType === "bu" || c.setupType === "none") {
    // Physical: scale on Atk
    const atk = c.atk || 80;
    if (atk >= 140) rawDmgBonus = 6;
    else if (atk >= 130) rawDmgBonus = 5;
    else if (atk >= 120) rawDmgBonus = 4;
    else if (atk >= 110) rawDmgBonus = 3;
    else if (atk >= 100) rawDmgBonus = 2;
    else if (atk >= 90) rawDmgBonus = 1;
    else rawDmgBonus = 0;
  } else {
    // Special: scale on SpA
    if (c.spa >= 140) rawDmgBonus = 6;
    else if (c.spa >= 130) rawDmgBonus = 5;
    else if (c.spa >= 120) rawDmgBonus = 4;
    else if (c.spa >= 110) rawDmgBonus = 3;
    else if (c.spa >= 100) rawDmgBonus = 2;
    else if (c.spa >= 90) rawDmgBonus = 1;
    else rawDmgBonus = 0;
  }

  // ABILITY: offense bonuses
  let abilityOffBonus = 0;
  if (c.fx.some(f => f.type === "freeLifeOrb")) abilityOffBonus += 2; // 30% damage boost free
  if (c.fx.some(f => f.type === "contrary")) abilityOffBonus += 2; // Leaf Storm stacks
  if (c.fx.some(f => f.type === "techBoost")) abilityOffBonus += 1;
  if (c.fx.some(f => f.type === "ironFist")) abilityOffBonus += 1;
  if (c.fx.some(f => f.type === "gutsBurn")) abilityOffBonus += 2; // 50% Atk boost

  const bossAtkTypes = [...new Set([...bossTypes, ...(teraType ? [teraType] : [])])];
  const defM = getDefMult(bossAtkTypes, c.types);
  let defScore = defM === 0 ? 10 : defM <= 0.25 ? 9 : defM <= 0.5 ? 7 : defM <= 1 ? 5 : defM <= 2 ? 3 : 1;

  // ABILITY: defense bonuses
  let abilityDefBonus = 0;
  for (const f of c.fx) {
    if (f.type === "typeImmune" && bossAtkTypes.includes(f.val)) abilityDefBonus += 4; // ability immunity vs boss type
    if (f.type === "intimidate" && bossStyle !== "special") abilityDefBonus += 1; // only triggers once on entry in raids
    if (f.type === "dmgHalved") abilityDefBonus += 2;
    if (f.type === "reflectDrops") abilityDefBonus += 1;
    if (f.type === "blockBombs") abilityDefBonus += 1;
    if (f.type === "statusBlock" || f.type === "statusImmune") abilityDefBonus += 1;
    if (f.type === "magicBounce") abilityDefBonus += 1;
    if (f.type === "contactDmg") abilityDefBonus += (bossStyle === "physical" ? 2 : 1);
    if (f.type === "contactBurn" && bossStyle === "physical") abilityDefBonus += 2;
    if (f.type === "doubleSecondary") abilityDefBonus += 1; // flinch = pseudo-defense
  }
  // Justified/Defiant bonuses vs Dark bosses
  if (c.fx.some(f => f.type === "justified") && bossAtkTypes.includes("Dark")) abilityOffBonus += 2;
  if (c.fx.some(f => f.type === "defiant")) abilityOffBonus += 1;

  let setupScore = 0;
  if (c.setupType === "qd") setupScore = 7;
  else if (c.setupType === "cm") setupScore = bossStyle === "special" ? 7 : bossStyle === "physical" ? 3 : 5;
  else if (c.setupType === "bu") setupScore = bossStyle === "physical" ? 7 : bossStyle === "special" ? 3 : 5;
  // Note: Prankster/Speed Boost/Unburden don't help in raids (no speed mechanic, no switching)

  // SUSTAIN — dynamic based on matchup quality
  // Hierarchy: Leech Seed (passive permanent 12.5%/turn) > Reliable recovery (50% HP/use) > Rest (full but 2 turns) > Drain moves (only good if they deal real damage)
  const hasLeech = c.moves.some(m => m.n === "Leech Seed");
  const hasReliable = c.moves.some(m => ["Recover","Soft-Boiled","Slack Off","Moonlight","Synthesis","Roost","Wish","Moonlight"].includes(m.n));
  const hasRest = c.moves.some(m => m.n === "Rest");
  // Drain moves scored by how much damage they'll actually deal (= how much they heal)
  let bestDrainScore = 0;
  for (const m of c.moves) {
    if (!m.cat.includes("sustain") || m.cat === "sustain") continue; // skip pure sustain like Recover, only check drain attacks
    if (!m.t) continue;
    const eff = getEff(m.t, effTypes);
    const isSTAB = c.stab.includes(m.t);
    // STAB+SE drain = great healing. Non-STAB resisted drain = worthless.
    let drainVal = 0;
    if (isSTAB && eff >= 2) drainVal = 3;      // STAB SE drain = big dmg = big heal
    else if (eff >= 2) drainVal = 2;            // Coverage SE drain = decent heal
    else if (isSTAB && eff >= 1) drainVal = 1;  // STAB neutral drain = ok heal
    // Non-STAB neutral or resisted = 0, not worth using as sustain
    bestDrainScore = Math.max(bestDrainScore, drainVal);
  }
  let sustainScore = 0;
  // Leech Seed is king: passive, permanent, 12.5%/turn, 1 turn cost
  if (hasLeech) sustainScore += 5;
  // Reliable recovery is excellent: 50% HP per use, always works
  if (hasReliable) sustainScore += 4;
  // Rest is decent: full heal but 2 turns asleep
  else if (hasRest && !hasReliable) sustainScore += 2;
  // Drain moves add on top IF they deal real damage in this matchup
  sustainScore += bestDrainScore;

  // Ability passive healing bonus
  let abilityHealBonus = 0;
  const passiveHealFx = c.fx.filter(f => f.type === "passiveHeal");
  for (const ph of passiveHealFx) {
    if (ph.val >= 12) abilityHealBonus += 3; // Poison Heal
    else if (ph.val >= 6) abilityHealBonus += 1; // Leftovers/Black Sludge
  }
  // Regenerator doesn't help in raids (no switching)
  if (c.fx.some(f => f.type === "rainHeal") && bossAtkTypes.includes("Water")) abilityHealBonus += 2;
  // Rage Fist scaling = pseudo-offense bonus in long fights
  if (c.fx.some(f => f.type === "rageFist") && raidMode === "group") abilityOffBonus += 3;

  let bulkProduct;
  if (bossStyle === "special") bulkProduct = c.hp * c.spd * Math.max(c.spd, c.def);
  else if (bossStyle === "physical") bulkProduct = c.hp * c.def * Math.max(c.def, c.spd);
  else bulkProduct = c.hp * c.def * c.spd;
  const bulkScore = Math.min(5, Math.round(bulkProduct / 400000 * 5));

  let immunityBonus = 0;
  let fullImmune = false;
  // Check actual boss moveset for full immunity (e.g. Ghost vs Normal/Fighting-only boss)
  if (bossMoves && bossMoves.length > 0) {
    const atkMoves = bossMoves.filter(m => m.bp > 0); // only attacking moves
    if (atkMoves.length > 0) {
      const immuneToAll = atkMoves.every(m => {
        let eff = getEff(m.type, c.types);
        // Also check ability immunities (Flash Fire vs Fire, Levitate vs Ground, etc.)
        if (c.fx.some(f => f.type === "typeImmune" && f.val === m.type)) eff = 0;
        return eff === 0;
      });
      if (immuneToAll) {
        fullImmune = true;
        immunityBonus = 25; // massive bonus — literally can't be damaged
      } else {
        // Count how many attacking moves we're immune to
        const immuneCount = atkMoves.filter(m => {
          let eff = getEff(m.type, c.types);
          if (c.fx.some(f => f.type === "typeImmune" && f.val === m.type)) eff = 0;
          return eff === 0;
        }).length;
        immunityBonus = immuneCount * 4; // partial immunity still very valuable
      }
    }
  } else {
    // No boss moveset data — fall back to type-based estimation
    for (const bt of bossAtkTypes) {
      let eff = getEff(bt, c.types);
      if (c.fx.some(f => f.type === "typeImmune" && f.val === bt)) eff = 0;
      if (eff === 0) immunityBonus += 3;
    }
  }

  // If fully immune to boss moveset, sustain doesn't matter at all
  if (fullImmune) { sustainScore = 0; abilityHealBonus = 0; }

  let wOff, wDef, wSetup, wSustain, wBulk;
  if (raidMode === "solo") { wOff = 4.0; wDef = 1.5; wSetup = 1.5; wSustain = 0.5; wBulk = 0.8; }
  else { wOff = 2.0; wDef = 2.0; wSetup = 1.5; wSustain = 1.2; wBulk = 1.5; }

  const total = ((offScore + abilityOffBonus) * wOff) + (rawDmgBonus * (raidMode === "solo" ? 3 : 1.5)) +
    ((defScore + abilityDefBonus) * wDef) + (setupScore * wSetup) +
    ((sustainScore + abilityHealBonus) * wSustain) + (bulkScore * wBulk) + immunityBonus;

  return { total: Math.round(total * 10) / 10, offense: offScore, abilityOff: abilityOffBonus, defense: defScore, abilityDef: abilityDefBonus, setup: setupScore, sustain: sustainScore, abilityHeal: abilityHealBonus, bulk: bulkScore, immunity: immunityBonus, bestOffMult: Math.round(bestMovePower), defMult: defM, hasStabSE: bestStabSE, rawDmgBonus, fullImmune };
}

// ─── UI ───
const TypeBadge = ({ type, small, onClick, selected }) => (
  <span onClick={onClick} style={{ display:"inline-block", padding: small ? "1px 6px" : "4px 10px", borderRadius:"4px", background: TC[type] || "#888", color: ["Electric","Ground","Ice","Steel","Normal"].includes(type) ? "#222" : "#fff", fontSize: small ? "9px" : "11px", fontWeight:700, letterSpacing:"0.6px", textTransform:"uppercase", cursor: onClick ? "pointer" : "default", border: selected ? "2px solid #fff" : "2px solid transparent", transition:"all 0.15s" }}>{type}</span>
);
const MoveSlot = ({ move, index, counterStab, effTypes }) => {
  const isFlex = move.cat === "flex"; const isSetup = move.cat === "setup"; const isSus = move.cat === "sustain" || move.n === "Leech Seed";
  const isDrain = move.cat?.includes("sustain") && move.cat?.includes("stab"); const isPri = move.cat?.includes("priority");
  const isSTAB = move.t && counterStab?.includes(move.t); const eff = move.t && effTypes ? getEff(move.t, effTypes) : 1; const isSE = eff >= 2;
  let tag = null, tc = "#555";
  if (isFlex) { tag = "ANY"; } else if (isSetup) { tag = "SETUP"; tc = "#F95587"; } else if (move.n === "Leech Seed") { tag = "SUSTAIN"; tc = "#56ab2f"; }
  else if (isSus) { tag = "HEAL"; tc = "#7AC74C"; } else if (isDrain && isSE) { tag = "DRAIN+SE"; tc = "#ffd700"; } else if (isDrain) { tag = "DRAIN"; tc = "#7AC74C"; }
  else if (isSTAB && isSE) { tag = "STAB+SE"; tc = "#ffd700"; } else if (isSE) { tag = "SE"; tc = "#ff8844"; } else if (isSTAB) { tag = "STAB"; tc = "#6390F0"; }
  else if (isPri) { tag = "PRIORITY"; tc = "#F7D02C"; }
  const bc = (tag === "STAB+SE" || tag === "DRAIN+SE") ? "rgba(255,215,0,0.5)" : isSetup ? "rgba(249,85,135,0.4)" : (isSus||isDrain||move.n==="Leech Seed") ? "rgba(122,199,76,0.4)" : isFlex ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.08)";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:"6px", padding:"6px 10px", borderRadius:"6px", background: isFlex ? "rgba(255,255,255,0.01)" : "rgba(255,255,255,0.03)", border:`1px solid ${bc}` }}>
      <span style={{ fontFamily:"monospace", fontSize:"18px", fontWeight:700, color:"#5a5550", minWidth:"12px" }}>{index+1}</span>
      {!isFlex && move.t && <span style={{ display:"inline-block", padding:"1px 5px", borderRadius:"3px", background:TC[move.t]||"#555", color:["Electric","Ground","Ice","Steel","Normal"].includes(move.t)?"#222":"#fff", fontSize:"15px", fontWeight:800, letterSpacing:"0.5px", textTransform:"uppercase", minWidth:"32px", textAlign:"center" }}>{move.t}</span>}
      <span style={{ flex:1, fontSize:"15px", fontWeight:isFlex?400:600, color:isFlex?"#5a5550":"#e0dcd6", fontStyle:isFlex?"italic":"normal" }}>{isFlex?"Any / Flex":move.n}</span>
      {tag && <span style={{ fontSize:"15px", fontWeight:800, letterSpacing:"0.6px", color:tc, textTransform:"uppercase", whiteSpace:"nowrap" }}>{tag}</span>}
    </div>
  );
};
const ScoreBar = ({ label, value, max, color, bonus }) => (
  <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"3px" }}>
    <span style={{ fontSize:"15px", color:"#8a8580", width:"52px", textAlign:"right", fontWeight:600 }}>{label}</span>
    <div style={{ flex:1, height:"7px", background:"rgba(255,255,255,0.06)", borderRadius:"3px", overflow:"hidden" }}>
      <div style={{ width:`${Math.min(100,(value/max)*100)}%`, height:"100%", background:color, borderRadius:"3px", transition:"width 0.4s" }}/>
    </div>
    <span style={{ fontSize:"15px", color:"#b0a8a0", width:"20px", fontWeight:700 }}>{value}</span>
    {bonus > 0 && <span style={{ fontSize:"18px", color:"#ffd700", fontWeight:700 }}>+{bonus}</span>}
  </div>
);
const EffLabel = ({ mult, isStabSE }) => {
  if (isStabSE && mult >= 4) return <span style={{color:"#ffd700",fontWeight:900,fontSize:"18px"}}>4× STAB SE ★</span>;
  if (isStabSE) return <span style={{color:"#ffd700",fontWeight:800,fontSize:"18px"}}>2× STAB SE ★</span>;
  if (mult >= 4) return <span style={{color:"#ff4444",fontWeight:800,fontSize:"18px"}}>4× SE</span>;
  if (mult >= 2) return <span style={{color:"#ff8844",fontWeight:700,fontSize:"18px"}}>2× SE</span>;
  if (mult >= 1) return <span style={{color:"#aaa",fontWeight:600,fontSize:"18px"}}>1×</span>;
  if (mult >= 0.5) return <span style={{color:"#66bb6a",fontWeight:600,fontSize:"18px"}}>Resist</span>;
  if (mult >= 0.25) return <span style={{color:"#4caf50",fontWeight:700,fontSize:"18px"}}>2× Resist</span>;
  return <span style={{color:"#00e5ff",fontWeight:800,fontSize:"18px"}}>IMMUNE</span>;
};

function App() {
  const [search, setSearch] = useState(""); const [selectedBoss, setSelectedBoss] = useState(null); const [teraType, setTeraType] = useState("");
  const [showDD, setShowDD] = useState(false); const [manualTypes, setManualTypes] = useState([]); const [useManual, setUseManual] = useState(false);
  const [bossStyle, setBossStyle] = useState("mixed"); const [raidMode, setRaidMode] = useState("solo");
  const [starLevel, setStarLevel] = useState(6);
  const bossMoveset = useMemo(() => selectedBoss ? getBossMoveset(selectedBoss, starLevel) : null, [selectedBoss, starLevel]);
  const autoBossStyle = useMemo(() => bossMoveset ? detectBossStyle(bossMoveset) : null, [bossMoveset]);
  const names = useMemo(() => Object.keys(pokemonDB).sort(), []);
  const filtered = useMemo(() => !search ? [] : names.filter(n => n.toLowerCase().includes(search.toLowerCase())).slice(0, 15), [search, names]);
  const bossTypes = useManual ? manualTypes : (selectedBoss ? pokemonDB[selectedBoss] : null);
  const effTypes = teraType ? [teraType] : bossTypes;
  const results = useMemo(() => {
    if (!bossTypes || bossTypes.length === 0) return [];
    return CP.map(c => ({ ...c, score: scoreCounter(c, bossTypes, teraType || null, bossStyle, raidMode, bossMoveset), recMoves: recommendMoves(c, bossTypes, teraType || null) }))
      .sort((a, b) => b.score.total - a.score.total).slice(0, 50);
  }, [bossTypes, teraType, bossStyle, raidMode, bossMoveset]);
  const selectBoss = (name) => { setSelectedBoss(name); setSearch(name); setShowDD(false); setTeraType(""); setUseManual(false); const ms = getBossMoveset(name, starLevel); if (ms) setBossStyle(detectBossStyle(ms)); };
  const toggleManualType = (t) => setManualTypes(p => p.includes(t) ? p.filter(x => x !== t) : p.length >= 2 ? [p[1], t] : [...p, t]);

  return (
    <div style={{ fontFamily:"'Courier New','Consolas',monospace", background:"#1e1b18", color:"#ebe7e1", minHeight:"100vh", padding:"16px" }}>
      <div style={{ maxWidth:"900px", margin:"0 auto" }}>
        <div style={{ textAlign:"center", marginBottom:"20px", padding:"16px", background:"linear-gradient(180deg, rgba(86,171,47,0.08) 0%, transparent 100%)", borderBottom:"2px solid rgba(86,171,47,0.2)" }}>
          <div style={{ fontSize:"15px", letterSpacing:"3px", color:"#56ab2f", marginBottom:"6px", fontWeight:700 }}>COBBLEVERSE RAID DENS</div>
          <h1 style={{ fontSize:"24px", fontWeight:800, margin:"0 0 4px", color:"#e8e4de" }}>⚔ RAID COUNTER ANALYZER</h1>
          <p style={{ fontSize:"18px", color:"#7a756e", margin:0 }}>STAB SE priority · Ability & Item synergies scored · Solo/Group · Physical/Special</p>
        </div>

        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:"10px", padding:"16px", marginBottom:"20px" }}>
          <div style={{ display:"flex", gap:"6px", marginBottom:"12px" }}>
            <button onClick={() => { setUseManual(false); setManualTypes([]); }} style={{ padding:"5px 12px", borderRadius:"6px", border: !useManual ? "1px solid rgba(86,171,47,0.5)" : "1px solid rgba(255,255,255,0.08)", background: !useManual ? "rgba(86,171,47,0.15)" : "transparent", color: !useManual ? "#56ab2f" : "#7a756e", fontSize:"18px", fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Search</button>
            <button onClick={() => { setUseManual(true); setSelectedBoss(null); setSearch(""); }} style={{ padding:"5px 12px", borderRadius:"6px", border: useManual ? "1px solid rgba(86,171,47,0.5)" : "1px solid rgba(255,255,255,0.08)", background: useManual ? "rgba(86,171,47,0.15)" : "transparent", color: useManual ? "#56ab2f" : "#7a756e", fontSize:"18px", fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Manual Type</button>
          </div>
          {!useManual ? (
            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"flex-start" }}>
              <div style={{ flex:"1 1 260px", position:"relative" }}>
                <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"4px" }}>RAID BOSS</label>
                <input type="text" value={search} placeholder="Pokémon name..." onChange={e => { setSearch(e.target.value); setSelectedBoss(null); setShowDD(true); }} onFocus={() => setShowDD(true)}
                  style={{ width:"100%", padding:"8px 12px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#ebe7e1", fontSize:"15px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
                {showDD && filtered.length > 0 && !selectedBoss && (
                  <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#1e1c18", border:"1px solid rgba(86,171,47,0.3)", borderRadius:"0 0 6px 6px", maxHeight:"260px", overflowY:"auto", zIndex:100 }}>
                    {filtered.map(name => (
                      <div key={name} onClick={() => selectBoss(name)} style={{ padding:"6px 12px", cursor:"pointer", display:"flex", alignItems:"center", gap:"6px", borderBottom:"1px solid rgba(255,255,255,0.04)", fontSize:"18px" }}
                        onMouseEnter={e => e.currentTarget.style.background="rgba(86,171,47,0.1)"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                        <span style={{ flex:1 }}>{name}</span>{pokemonDB[name].map(t => <TypeBadge key={t} type={t} small />)}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{ flex:"0 0 130px" }}>
                <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"4px" }}>TERA TYPE</label>
                <select value={teraType} onChange={e => setTeraType(e.target.value)} style={{ width:"100%", padding:"8px 12px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#ebe7e1", fontSize:"18px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}>
                  <option value="">None</option>{TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </div>
          ) : (
            <div>
              <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>BOSS TYPES (1-2)</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"10px" }}>{TYPES.map(t => <TypeBadge key={t} type={t} onClick={() => toggleManualType(t)} selected={manualTypes.includes(t)} />)}</div>
              {manualTypes.length > 0 && <select value={teraType} onChange={e => setTeraType(e.target.value)} style={{ padding:"6px 10px", borderRadius:"6px", border:"1px solid rgba(86,171,47,0.3)", background:"rgba(0,0,0,0.3)", color:"#ebe7e1", fontSize:"15px", fontFamily:"inherit", outline:"none" }}>
                <option value="">Tera: None</option>{TYPES.map(t => <option key={t} value={t}>Tera: {t}</option>)}
              </select>}
            </div>
          )}
          <div style={{ display:"flex", gap:"20px", marginTop:"12px", flexWrap:"wrap" }}>
            <div>
              <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>RAID STARS</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[[5,"5★ Lv75","#A8A77A"],[6,"6★ Lv90","#ffd700"],[7,"7★ Lv100","#C22E28"]].map(([s,l,col]) => (
                  <button key={s} onClick={() => setStarLevel(s)} style={{ padding:"5px 10px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: starLevel===s ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: starLevel===s ? `${col}22` : "transparent", color: starLevel===s ? col : "#7a756e", fontSize:"15px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>BOSS ATTACKS {autoBossStyle && <span style={{color:"#5a5550",fontWeight:400}}>(auto: {autoBossStyle})</span>}</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["physical","⚔ Phys","#C22E28"],["special","✦ Spec","#6390F0"],["mixed","◆ Mix","#A8A77A"]].map(([s,l,col]) => (
                  <button key={s} onClick={() => setBossStyle(s)} style={{ padding:"5px 10px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: bossStyle===s ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: bossStyle===s ? `${col}22` : "transparent", color: bossStyle===s ? col : "#7a756e", fontSize:"15px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:"15px", letterSpacing:"1.5px", color:"#56ab2f", fontWeight:700, display:"block", marginBottom:"6px" }}>RAID MODE</label>
              <div style={{ display:"flex", gap:"5px" }}>
                {[["solo","Solo","#ffd700"],["group","Group","#56ab2f"]].map(([m,l,col]) => (
                  <button key={m} onClick={() => setRaidMode(m)} style={{ padding:"5px 10px", borderRadius:"6px", fontFamily:"inherit", cursor:"pointer", border: raidMode===m ? `1px solid ${col}` : "1px solid rgba(255,255,255,0.08)", background: raidMode===m ? `${col}22` : "transparent", color: raidMode===m ? col : "#7a756e", fontSize:"15px", fontWeight:700 }}>{l}</button>
                ))}
              </div>
            </div>
          </div>
          {bossTypes && bossTypes.length > 0 && (
            <div style={{ marginTop:"12px", padding:"10px 14px", background:"rgba(0,0,0,0.2)", borderRadius:"6px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap", marginBottom: bossMoveset ? "8px" : 0 }}>
                <span style={{ fontWeight:700, fontSize:"18px" }}>{selectedBoss || "Custom"}</span>
                <div style={{ display:"flex", gap:"3px" }}>{bossTypes.map(t => <TypeBadge key={t} type={t} />)}</div>
                {teraType && <><span style={{ fontSize:"15px", color:"#7a756e" }}>TERA→</span><TypeBadge type={teraType} /><span style={{ fontSize:"18px", color:"#5a5550" }}>(def as {teraType}, STAB {[...new Set([...bossTypes,teraType])].join("+")})</span></>}
              </div>
              {bossMoveset && (
                <div>
                  <div style={{ fontSize:"18px", letterSpacing:"1px", color:"#C22E28", fontWeight:700, marginBottom:"4px" }}>BOSS MOVESET (Lv{starLevel >= 7 ? 100 : starLevel >= 6 ? 90 : 75} — last 4 level-up moves)</div>
                  <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                    {bossMoveset.map((m, i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:"4px", padding:"4px 8px", borderRadius:"5px", background:"rgba(194,46,40,0.08)", border:"1px solid rgba(194,46,40,0.15)" }}>
                        <span style={{ display:"inline-block", padding:"1px 5px", borderRadius:"3px", background:TC[m.type]||"#555", color:["Electric","Ground","Ice","Steel","Normal"].includes(m.type)?"#222":"#fff", fontSize:"15px", fontWeight:800, letterSpacing:"0.5px", textTransform:"uppercase", minWidth:"28px", textAlign:"center" }}>{m.type}</span>
                        <span style={{ fontSize:"18px", fontWeight:600, color:"#ebe7e1" }}>{m.name}</span>
                        {m.bp > 0 && <span style={{ fontSize:"18px", color: m.cat==="P" ? "#C22E28" : "#6390F0", fontWeight:700 }}>{m.bp}{m.cat==="P"?"⚔":"✦"}</span>}
                        {m.bp === 0 && <span style={{ fontSize:"18px", color:"#7a756e" }}>status</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {results.length > 0 && (
          <div>
            <div style={{ fontSize:"15px", letterSpacing:"2px", color:"#56ab2f", fontWeight:700, marginBottom:"10px", paddingBottom:"6px", borderBottom:"1px solid rgba(86,171,47,0.15)" }}>
              TOP COUNTERS — {raidMode === "solo" ? "SOLO (DAMAGE)" : "GROUP (SUSTAIN)"} — {bossStyle === "physical" ? "VS PHYSICAL" : bossStyle === "special" ? "VS SPECIAL" : "VS MIXED"}
            </div>
            {results.map((c, i) => (
              <div key={c.name} style={{ background: i === 0 ? "linear-gradient(135deg, rgba(86,171,47,0.08), rgba(255,215,0,0.04))" : "rgba(255,255,255,0.015)", border: i === 0 ? "1px solid rgba(86,171,47,0.3)" : "1px solid rgba(255,255,255,0.04)", borderRadius:"10px", padding:"16px", marginBottom:"12px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"10px", flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"monospace", fontSize:"18px", fontWeight:900, color: i === 0 ? "#ffd700" : i < 3 ? "#56ab2f" : "#5a5550", minWidth:"24px" }}>#{i+1}</span>
                  <span style={{ fontWeight:800, fontSize:"18px", color:"#e8e4de" }}>{c.name}</span>
                  <div style={{ display:"flex", gap:"2px" }}>{c.types.map(t => <TypeBadge key={t} type={t} small />)}</div>
                  <span style={{ fontSize:"18px", padding:"2px 5px", borderRadius:"3px", background:c.setupType==="cm"?"rgba(99,144,240,0.2)":c.setupType==="bu"?"rgba(194,46,40,0.2)":c.setupType==="qd"?"rgba(249,85,135,0.2)":"rgba(255,255,255,0.05)", color:c.setupType==="cm"?"#6390F0":c.setupType==="bu"?"#C22E28":c.setupType==="qd"?"#F95587":"#777", fontWeight:700 }}>
                    {c.setupType==="cm"?"CM":c.setupType==="bu"?"BU":c.setupType==="qd"?"QD":"WALL"}
                  </span>
                  {c.score.hasStabSE && <span style={{ fontSize:"15px", padding:"2px 5px", borderRadius:"3px", background:"rgba(255,215,0,0.15)", color:"#ffd700", fontWeight:800 }}>★ STAB SE</span>}
                  {c.score.fullImmune && <span style={{ fontSize:"15px", padding:"2px 5px", borderRadius:"3px", background:"rgba(0,229,255,0.2)", color:"#00e5ff", fontWeight:800 }}>🛡 IMMUNE TO ALL MOVES</span>}
                  <span style={{ marginLeft:"auto", fontSize:"15px", fontWeight:900, color: c.score.total >= 50 ? "#ffd700" : c.score.total >= 38 ? "#56ab2f" : "#b0a8a0" }}>{c.score.total}</span>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"8px" }}>
                  <div>
                    <div style={{ fontSize:"18px", letterSpacing:"1px", color:"#56ab2f", fontWeight:700, marginBottom:"4px" }}>SCORES</div>
                    <ScoreBar label="Offense" value={c.score.offense} max={12} color={c.score.hasStabSE?"#ffd700":"#ff8844"} bonus={c.score.abilityOff} />
                    <ScoreBar label="Power" value={c.score.rawDmgBonus} max={6} color="#ff6b6b" />
                    <ScoreBar label="Defense" value={c.score.defense} max={10} color="#6390F0" bonus={c.score.abilityDef} />
                    <ScoreBar label="Setup" value={c.score.setup} max={9} color="#F95587" />
                    <ScoreBar label="Sustain" value={c.score.sustain} max={12} color="#7AC74C" bonus={c.score.abilityHeal} />
                    <ScoreBar label="Bulk" value={c.score.bulk} max={5} color="#B7B7CE" />
                    {c.score.immunity > 0 && <ScoreBar label={c.score.fullImmune ? "IMMUNE!" : "Immune"} value={c.score.immunity} max={25} color="#00e5ff" />}
                  </div>
                  <div>
                    <div style={{ fontSize:"18px", letterSpacing:"1px", color:"#56ab2f", fontWeight:700, marginBottom:"4px" }}>MOVESET</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:"2px" }}>
                      {c.recMoves.map((m, j) => <MoveSlot key={j} move={m} index={j} counterStab={c.stab} effTypes={effTypes} />)}
                    </div>
                  </div>
                </div>

                {/* Ability/Item bar */}
                <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"6px" }}>
                  <span style={{ fontSize:"15px", padding:"3px 8px", borderRadius:"4px", background:"rgba(249,85,135,0.1)", border:"1px solid rgba(249,85,135,0.2)", color:"#F95587", fontWeight:700 }}>{c.ability}</span>
                  {c.item && <span style={{ fontSize:"15px", padding:"3px 8px", borderRadius:"4px", background:"rgba(255,215,0,0.1)", border:"1px solid rgba(255,215,0,0.2)", color:"#ffd700", fontWeight:700 }}>{c.item}</span>}
                  <span style={{ fontSize:"15px", padding:"3px 8px", borderRadius:"4px", background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.2)", color:"#ff6b6b", fontWeight:700 }}>
                    {(c.setupType === "bu" || c.setupType === "none") ? `${c.atk || "?"} Atk` : `${c.spa} SpA`}
                  </span>
                </div>

                {/* Ability effects */}
                <div style={{ display:"flex", gap:"4px", flexWrap:"wrap", marginBottom:"6px" }}>
                  {c.fx.map((f, fi) => (
                    <span key={fi} style={{ fontSize:"18px", padding:"2px 6px", borderRadius:"3px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", color:"#b0a8a0" }}>{f.desc}</span>
                  ))}
                </div>

                <div style={{ display:"flex", gap:"12px", flexWrap:"wrap", fontSize:"18px", marginBottom:"4px", padding:"6px 8px", background:"rgba(0,0,0,0.15)", borderRadius:"4px" }}>
                  <div><span style={{ color:"#7a756e" }}>Best Move: </span>
                    <span style={{color: c.score.bestOffMult >= 300 ? "#ffd700" : c.score.bestOffMult >= 200 ? "#ff8844" : c.score.bestOffMult >= 130 ? "#aaa" : "#666", fontWeight:800, fontSize:"18px"}}>
                      {c.score.bestOffMult} eff.pwr{c.score.hasStabSE ? " ★" : ""}
                    </span>
                  </div>
                  <div><span style={{ color:"#7a756e" }}>Boss→You: </span><EffLabel mult={c.score.defMult} /></div>
                </div>
                <div style={{ fontSize:"18px", color:"#9a9490", lineHeight:1.4 }}>{c.note}</div>
              </div>
            ))}
          </div>
        )}

        {(!bossTypes || bossTypes.length === 0) && (
          <div style={{ textAlign:"center", padding:"40px 20px", color:"#5a5550", fontSize:"18px" }}>
            <div style={{ fontSize:"32px", marginBottom:"10px", opacity:0.4 }}>⚔</div>
            Search for a raid boss or select types manually.
          </div>
        )}

        <div style={{ marginTop:"28px", textAlign:"center", fontSize:"18px", color:"#3a3530", paddingTop:"12px", borderTop:"1px solid rgba(255,255,255,0.04)", lineHeight:1.6 }}>
          Ability/Item bonuses shown as gold <span style={{color:"#ffd700"}}>+N</span> next to score bars · <span style={{color:"#ff6b6b"}}>Power</span> = base Atk/SpA (140+=6, &lt;90=0)
          <br/><span style={{color:"#7AC74C"}}>Sustain</span>: Leech Seed=5 (passive permanent) &gt; Recover/Roost=4 (50% HP) &gt; Rest=2 · Drain moves scale with matchup: STAB+SE +3, SE +2, STAB neutral +1, resisted +0
          <br/>Solo: Offense ×4 + Power ×3 · Group: Sustain ×1.2 + Defense ×2 · Tera: defends as Tera, attacks with all STAB
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
